          "@id": "https://www.velyr.io/#product",
          "name": "Velyr — AI Website Audit & Growth Agent",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://www.velyr.io",
          "description": "AI-powered website and social media audit with a free score, specific fixes, and an autonomous growth agent that ships conversion improvements weekly.",
          "provider": { "@id": "https://www.velyr.io/#organization" },
          "offers": [
            {
              "@type": "Offer",
              "name": "Free Scan",
              "price": "0",
              "priceCurrency": "EUR",
              "description": "Free AI audit of your website and social media — overall score, benchmarks, top 2 priority fixes. No account needed."
            },
            {
              "@type": "Offer",
              "name": "Full Report",
              "price": "9",
              "priceCurrency": "EUR",
              "description": "Complete AI audit with all 5 priority actions, deep social dive, hook analysis, caption rewrites, and brand clarity score."
            },
            {
              "@type": "Offer",
              "name": "Growth Agent",
              "price": "29",
              "priceCurrency": "EUR",
              "priceSpecification": {
                "@type": "UnitPriceSpecification",
                "price": "29",
                "priceCurrency": "EUR",
                "billingDuration": "P1M"
              },
              "description": "Autonomous weekly AI agent that reads your analytics, writes the fix, opens a GitHub PR, and waits for your Telegram approval."
            }
          ]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Do I need an account to use Velyr?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. You can scan your business and see your score without creating an account. The full report is a one-time €9 payment — no login, no subscription required."
              }
            },
            {
              "@type": "Question",
              "name": "What is the Velyr Growth Agent?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The Growth Agent is a semi-autonomous AI that runs every Monday, reads your real analytics and GitHub repo, finds your biggest conversion problem, writes the code fix, opens a Pull Request, and sends you a Telegram message to approve or reject it — all automatically."
              }
            },
            {
              "@type": "Question",
              "name": "How does the Growth Agent approval process work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Every Monday you receive a Telegram message from the agent with the problem it found, the data behind it, the exact fix, and a link to the GitHub PR. You reply 'approve [id]' to merge it live, or 'reject [id]' to discard it. Nothing ships without your approval."
              }
            },
            {
              "@type": "Question",
              "name": "What happens if the agent's change makes things worse?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The agent checks your bounce rate 48 hours after every deployment. If it increased by 15 or more percentage points, it automatically opens a rollback PR, merges it, and notifies you via Telegram. Your site reverts to the original state without any manual work."
              }
            },
            {
              "@type": "Question",
              "name": "Which platforms does Velyr support?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Website, TikTok, Instagram, YouTube, X (Twitter), Facebook, and LinkedIn. You don't need all of them — just add what you have."
              }
            }
          ]
        }
      ]
    }
